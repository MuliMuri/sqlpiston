name: publish

on:
  push:
    tags:
      - 'v*'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          pip install pytest coverage pymysql
      - name: Build check
        run: python -m build
      - name: Install built package
        run: pip install dist/*.whl
      - name: Run tests against built package
        run: |
          cd /tmp
          coverage run --source sqlpiston --parallel-mode -m pytest ${{ github.workspace }}/tests/
          coverage combine
          coverage report --fail-under=100

  pypi:
    needs: check
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
